spring.application.name=${APP_NAME:phishguard}

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/phishguard}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:2004}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}

# API Doc
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Ollama
server.ollama.url=${OLLAMA_URL:http://172.25.39.105:11434}
server.ollama.model=${OLLAMA_MODEL:qwen3.5:4b}

# Groq
server.groq.url=${GROQ_URL:https://api.groq.com}
server.groq.api-key=${GROQ_API_KEY}
server.groq.model=${GROQ_MODEL:llama-3.1-8b-instant}


# LLM Provider
llm.provider=${LLM_PROVIDER:groq}

server.port=${PORT:8081}

logging.level.org.springframework.security=DEBUG

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/phishguard
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/phishguard/protocol/openid-connect/certs
